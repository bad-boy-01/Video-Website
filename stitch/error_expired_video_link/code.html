<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Expired Video Link - VideoStream</title>
<!-- BEGIN: Tailwind CSS Setup -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              primary: '#8b5cf6', // Purple-500
              secondary: '#6d28d9', // Purple-700
              dark: '#0f172a', // Slate-900
              surface: '#1e293b' // Slate-800
            }
          }
        }
      }
    }
  </script>
<!-- END: Tailwind CSS Setup -->
<!-- BEGIN: Custom Styles -->
<style data-purpose="layout-animations">
    @keyframes pulse-slow {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .animate-pulse-slow {
      animation: pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
  </style>
<!-- END: Custom Styles -->
</head>
<body class="bg-brand-dark text-slate-100 flex items-center justify-center min-h-screen p-4 font-sans">
<!-- BEGIN: Main Error Container -->
<main class="max-w-md w-full text-center space-y-8 animate-in fade-in duration-700" data-purpose="error-screen">
<!-- BEGIN: Brand Logo -->
<header class="mb-12">
<div class="inline-flex items-center gap-2">
<div class="w-10 h-10 bg-brand-primary rounded-lg flex items-center justify-center shadow-lg shadow-brand-primary/20">
<svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="text-2xl font-bold tracking-tight text-white uppercase italic">VideoStream</span>
</div>
</header>
<!-- END: Brand Logo -->
<!-- BEGIN: Error Icon -->
<section class="relative flex justify-center">
<!-- Decorative Glow -->
<div class="absolute inset-0 bg-brand-primary/20 blur-3xl rounded-full scale-125"></div>
<div class="relative w-24 h-24 bg-brand-surface border border-slate-700 rounded-full flex items-center justify-center shadow-2xl">
<svg class="w-12 h-12 text-brand-primary animate-pulse-slow" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
<!-- Overlay X badge -->
<div class="absolute bottom-0 right-0 bg-red-500 text-white rounded-full p-1 border-4 border-brand-dark">
<svg class="h-4 w-4" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" fill-rule="evenodd"></path>
</svg>
</div>
</div>
</section>
<!-- END: Error Icon -->
<!-- BEGIN: Text Content -->
<article class="space-y-4">
<h1 class="text-3xl font-extrabold text-white tracking-tight">Access Link Expired</h1>
<div class="space-y-2 text-slate-400 max-w-sm mx-auto">
<p>Your secure playback link has timed out for your protection.</p>
<p class="text-sm">For security, video links are temporary and must be re-validated periodically.</p>
</div>
</article>
<!-- END: Text Content -->
<!-- BEGIN: Action Area -->
<section class="flex flex-col items-center gap-4 pt-4">
<button class="group relative inline-flex items-center justify-center px-8 py-4 font-bold text-white transition-all duration-200 bg-brand-primary rounded-xl hover:bg-brand-secondary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-primary focus:ring-offset-brand-dark shadow-lg shadow-brand-primary/25" data-purpose="action-button" id="refresh-player-btn">
<svg class="w-5 h-5 mr-2 group-hover:rotate-180 transition-transform duration-500" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
        Refresh Player
      </button>
<button class="text-slate-500 hover:text-slate-300 transition-colors text-sm font-medium" data-purpose="secondary-action">
        Go to Dashboard
      </button>
</section>
<!-- END: Action Area -->
<!-- BEGIN: Support Footer -->
<footer class="pt-12 text-xs text-slate-600 border-t border-slate-800/50">
<p>Error Code: SEC_URL_EXPIRED</p>
<p class="mt-1">© 2023 VideoStream Security Protocol</p>
</footer>
<!-- END: Support Footer -->
</main>
<!-- END: Main Error Container -->
<!-- BEGIN: Handlers -->
<script data-purpose="event-handlers">
    document.getElementById('refresh-player-btn').addEventListener('click', function() {
      // Simulate backend request
      this.classList.add('opacity-50', 'cursor-not-allowed');
      this.innerHTML = 'Generating New Link...';
      
      // In a real application, this would trigger an AJAX call or page reload
      setTimeout(() => {
        console.log('Requesting fresh signed URL...');
        window.location.reload();
      }, 800);
    });
  </script>
<!-- END: Handlers -->
</body></html>
