<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Connection Lost - VideoStream</title>
<!-- BEGIN: Scripts and Stylesheets -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              primary: '#E50914', // Classic streaming red
              dark: '#0F0F0F',    // Deep premium background
              surface: '#1F1F1F'  // Card/Modal background
            }
          }
        }
      }
    }
  </script>
<!-- END: Scripts and Stylesheets -->
<style data-purpose="animations">
    @keyframes pulse-slow {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .animate-pulse-slow {
      animation: pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    .retry-loader {
      display: none;
    }
    .loading .retry-text {
      display: none;
    }
    .loading .retry-loader {
      display: inline-block;
    }
  </style>
</head>
<body class="bg-brand-dark text-white font-sans antialiased min-h-screen flex items-center justify-center p-4">
<!-- BEGIN: ErrorStateContainer -->
<main class="max-w-md w-full text-center space-y-8 py-12 px-6 rounded-2xl bg-brand-surface/30 backdrop-blur-sm border border-white/5 shadow-2xl" data-purpose="error-state-view" id="error-container">
<!-- BEGIN: VisualIllustration -->
<div class="relative flex justify-center mb-8" data-purpose="connection-illustration">
<!-- Glow Effect Background -->
<div class="absolute inset-0 bg-brand-primary/10 blur-[80px] rounded-full"></div>
<!-- Icon Container -->
<div class="relative bg-brand-surface p-8 rounded-full border border-white/10 shadow-inner">
<svg aria-hidden="true" class="h-20 w-20 text-gray-400 animate-pulse-slow" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 011.06 0z" stroke-linecap="round" stroke-linejoin="round"></path>
<!-- Slash for "Lost Connection" -->
<line stroke="currentColor" stroke-width="2" x1="3" x2="21" y1="3" y2="21"></line>
</svg>
</div>
</div>
<!-- END: VisualIllustration -->
<!-- BEGIN: MessageContent -->
<div class="space-y-3">
<h1 class="text-2xl md:text-3xl font-bold tracking-tight text-white">
        Lost Connection
      </h1>
<p class="text-gray-400 text-base md:text-lg leading-relaxed">
        We're having trouble reaching our servers. Please check your internet connection.
      </p>
<!-- Subtle Hint -->
<div class="pt-2 flex items-center justify-center gap-2 text-xs font-medium uppercase tracking-widest text-gray-500">
<span class="inline-block w-1.5 h-1.5 rounded-full bg-yellow-500"></span>
        Check your internet
      </div>
</div>
<!-- END: MessageContent -->
<!-- BEGIN: ActionButtons -->
<div class="pt-6 space-y-4">
<button class="group relative w-full inline-flex items-center justify-center px-8 py-3.5 font-bold text-white transition-all duration-200 bg-brand-primary rounded-lg hover:bg-red-700 active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-brand-primary focus:ring-offset-2 focus:ring-offset-brand-dark" data-purpose="retry-action" id="retry-button" onclick="handleRetry()">
<span class="retry-text">Retry Connection</span>
<span class="retry-loader">
<svg class="animate-spin h-5 w-5 text-white" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
<path class="opacity-75" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" fill="currentColor"></path>
</svg>
</span>
</button>
<a class="block text-sm text-gray-400 hover:text-white transition-colors duration-200 underline underline-offset-4" data-purpose="secondary-action" href="/">
        Back to Home
      </a>
</div>
<!-- END: ActionButtons -->
</main>
<!-- END: ErrorStateContainer -->
<!-- BEGIN: Scripts -->
<script data-purpose="event-handlers">
    /**
     * Handles the visual feedback for the retry attempt
     */
    function handleRetry() {
      const btn = document.getElementById('retry-button');
      
      // Prevent double clicks
      if (btn.classList.contains('loading')) return;

      btn.classList.add('loading');
      btn.disabled = true;

      // Simulate a reconnection check
      setTimeout(() => {
        btn.classList.remove('loading');
        btn.disabled = false;
        
        // In a real app, logic would go here to check online status:
        // if(navigator.onLine) { window.location.reload(); }
        console.log('Attempting to reconnect...');
      }, 2000);
    }

    // Optional: Real-time listener for connection returning
    window.addEventListener('online', () => {
      console.log('Connection restored. Refreshing...');
      // Logic to auto-refresh or hide the error could go here
    });
  </script>
<!-- END: Scripts -->
</body></html>
