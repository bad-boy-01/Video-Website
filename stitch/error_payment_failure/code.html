<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Payment Failed - VideoStream</title>
<!-- Tailwind CSS CDN with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-animations">
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeInDown 0.6s ease-out forwards;
    }
  </style>
</head>
<body class="bg-[#0f0f12] text-white font-sans min-h-screen flex items-center justify-center p-4">
<!-- BEGIN: ErrorContainer -->
<main class="max-w-md w-full bg-[#1a1a1f] border border-white/10 rounded-2xl shadow-2xl overflow-hidden animate-fade-in" data-purpose="payment-failure-card">
<!-- BEGIN: HeaderIcon -->
<div class="pt-10 pb-6 flex justify-center" data-purpose="status-icon-container">
<div class="relative">
<!-- Error Circle Background -->
<div class="absolute inset-0 bg-red-500/20 blur-xl rounded-full"></div>
<!-- Main Icon -->
<div class="relative bg-red-500/10 border-2 border-red-500 rounded-full p-5">
<svg class="h-12 w-12 text-red-500" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
</div>
</div>
<!-- END: HeaderIcon -->
<!-- BEGIN: ErrorMessage -->
<div class="px-8 text-center" data-purpose="error-text-content">
<h1 class="text-2xl font-bold mb-2">Transaction Declined</h1>
<p class="text-gray-400 text-sm">
        We were unable to process your payment for <strong>VideoStream</strong> credits.
      </p>
<!-- Specific Error Reason Box -->
<div class="mt-6 p-3 bg-red-500/5 border border-red-500/20 rounded-lg" data-purpose="error-reason-box">
<p class="text-red-400 text-sm font-medium">
          Reason: Insufficient funds or card declined by bank
        </p>
</div>
</div>
<!-- END: ErrorMessage -->
<!-- BEGIN: OrderSummary -->
<section class="mt-8 px-8" data-purpose="order-summary-section">
<div class="bg-[#23232a] rounded-xl p-4 flex items-center justify-between border border-white/5">
<div class="flex items-center gap-4">
<!-- Item Thumbnail Placeholder -->
<div class="w-12 h-12 bg-purple-600 rounded-lg flex items-center justify-center shadow-lg shadow-purple-900/20">
<svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<div>
<p class="text-xs text-gray-400 uppercase tracking-wider font-semibold">Item Purchase</p>
<p class="text-sm font-bold text-white">100 Coin Bundle</p>
</div>
</div>
<div class="text-right">
<p class="text-lg font-bold text-white">$9.99</p>
</div>
</div>
</section>
<!-- END: OrderSummary -->
<!-- BEGIN: ActionButtons -->
<footer class="p-8 space-y-3" data-purpose="action-buttons-group">
<!-- Primary Action -->
<button class="w-full bg-purple-600 hover:bg-purple-500 active:scale-[0.98] transition-all text-white font-bold py-4 rounded-xl shadow-lg shadow-purple-600/20" data-purpose="try-again-button" onclick="window.location.reload()">
        Try Again
      </button>
<!-- Secondary Action -->
<button class="w-full bg-[#23232a] hover:bg-[#2d2d35] text-gray-300 font-semibold py-4 rounded-xl border border-white/10 transition-colors" data-purpose="change-method-button">
        Use Different Method
      </button>
<!-- Navigation Link -->
<div class="pt-4 text-center">
<a class="text-xs text-gray-500 hover:text-purple-400 underline underline-offset-4 transition-colors" href="#">
          Contact Customer Support
        </a>
</div>
</footer>
<!-- END: ActionButtons -->
</main>
<!-- END: ErrorContainer -->
</body></html>
