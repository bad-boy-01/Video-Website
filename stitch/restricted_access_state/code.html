<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Restricted Access State</title>
<!-- Tailwind CSS v3 with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-animations">
    @keyframes pulse-slow {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
    }
    .animate-pulse-slow {
      animation: pulse-slow 4s ease-in-out infinite;
    }
    .gradient-text {
      background: linear-gradient(135deg, #f87171 0%, #ef4444 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    /* VideoStream Dark Aesthetic Base */
    body {
      background-color: #0a0a0a;
      color: #ffffff;
      overflow: hidden;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen">
<!-- BEGIN: AccessDeniedContainer -->
<main class="relative z-10 w-full max-w-2xl px-6 text-center" data-purpose="access-denied-wrapper">
<!-- BEGIN: DecorativeBackground -->
<!-- Large subtle glow in the background for depth -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-red-900/20 rounded-full blur-[120px] -z-10"></div>
<!-- END: DecorativeBackground -->
<!-- BEGIN: IconSection -->
<div class="mb-8 flex justify-center" data-purpose="icon-container">
<div class="relative group">
<!-- Outer glowing ring -->
<div class="absolute inset-0 bg-red-600/20 rounded-full blur-2xl animate-pulse-slow"></div>
<!-- The Shield/Lock Icon Representation -->
<div class="relative bg-zinc-900 border border-zinc-800 p-8 rounded-full shadow-2xl">
<svg class="w-20 h-20 text-red-500" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
</div>
</div>
<!-- END: IconSection -->
<!-- BEGIN: TextContent -->
<div class="space-y-4 mb-12" data-purpose="error-message-content">
<h1 class="text-6xl font-black tracking-tighter sm:text-7xl gradient-text mb-2">
        403
      </h1>
<h2 class="text-2xl sm:text-3xl font-bold text-zinc-100 tracking-tight">
        Access Denied
      </h2>
<p class="text-zinc-400 text-lg max-w-md mx-auto leading-relaxed">
        You don't have the required permissions to access this premium content or administrative route.
      </p>
</div>
<!-- END: TextContent -->
<!-- BEGIN: ActionButtons -->
<div class="flex flex-col sm:flex-row items-center justify-center gap-4" data-purpose="action-controls">
<!-- Primary Action: Home -->
<a class="w-full sm:w-auto px-8 py-3.5 bg-zinc-100 hover:bg-white text-black font-semibold rounded-lg transition-all duration-200 transform hover:scale-105 active:scale-95 shadow-lg flex items-center justify-center gap-2" href="/">
<svg class="h-5 w-5" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path>
</svg>
        Return Home
      </a>
<!-- Secondary Action: Contact Admin -->
<button class="w-full sm:w-auto px-8 py-3.5 bg-zinc-800/50 hover:bg-zinc-800 text-zinc-300 hover:text-white border border-zinc-700 font-semibold rounded-lg transition-all duration-200 flex items-center justify-center gap-2">
<svg class="h-5 w-5" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"></path>
<path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"></path>
</svg>
        Contact Admin
      </button>
</div>
<!-- END: ActionButtons -->
</main>
<!-- END: AccessDeniedContainer -->
<!-- BEGIN: FooterBranding -->
<footer class="fixed bottom-8 left-0 right-0 text-center" data-purpose="branding-footer">
<p class="text-zinc-600 text-sm font-medium tracking-widest uppercase">
      VideoStream Security System
    </p>
</footer>
<!-- END: FooterBranding -->
</body></html>
